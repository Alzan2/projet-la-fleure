<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - FleurShop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-login">

  <div class="bloc-login">
    <h1>Inscription</h1>
    <p>Créez votre compte FleurShop</p>

    <form>
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom">

      <label for="email">Adresse mail</label>
      <input type="email" id="email" name="email" placeholder="Votre email">

      <label for="mdp">Mot de passe</label>
      <input type="password" id="mdp" name="mdp" placeholder="Votre mot de passe">

      <label for="mdp2">Confirmer le mot de passe</label>
      <input type="password" id="mdp2" name="mdp2" placeholder="Confirmez le mot de passe">

      <button type="submit" class="btn-login">S'inscrire</button>
    </form>

    <p class="lien-inscription">
      Déjà un compte ?
      <a href="login.html">Se connecter</a>
    </p>

    <a href="index.html" class="retour-accueil">Retour à l'accueil</a>
  </div>

</body>
</html>
